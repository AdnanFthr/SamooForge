<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS OrderApps V3 - Local</title>
    <link rel="icon" type="image/x-icon" href="./frontend/assets/images/Logo3.png">
    <link rel="stylesheet" href="frontend/assets/css/global.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'CustomFont', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f5c93 0%, #1e3a5f 100%);
            color: white;
            overflow: hidden;
        }

        .landing-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            animation: fadeInUp 0.8s ease;
        }

        .logo-section {
            margin-bottom: 40px;
        }

        .logo-section img {
            width: 120px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .logo-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .logo-section p {
            font-size: 1.1rem;
            opacity: 0.9;
            color: #c6a048;
        }

        .version-badge {
            display: inline-block;
            background: rgba(198, 160, 72, 0.2);
            border: 1px solid #c6a048;
            color: #c6a048;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
            text-align: center;
        }

        .feature-item {
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .feature-text {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .entry-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #c6a048 0%, #b58d3a 100%);
            color: #1e3a5f;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(198, 160, 72, 0.3);
            margin-top: 20px;
        }

        .entry-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(198, 160, 72, 0.4);
        }

        .entry-button:active {
            transform: translateY(-1px);
        }

        .arrow-icon {
            transition: transform 0.3s ease;
        }

        .entry-button:hover .arrow-icon {
            transform: translateX(5px);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.85rem;
            opacity: 0.6;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .landing-container {
                padding: 20px;
            }

            .logo-section h1 {
                font-size: 2rem;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .entry-button {
                width: 100%;
                justify-content: center;
                padding: 16px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="logo-section">
            <div style="font-size: 4rem; margin-bottom: 20px;">🏢</div>
            <h1>SAS OrderApps</h1>
            <p>Procurement Management System</p>
        </div>

        <div class="version-badge">V3 LOCAL EDITION</div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">📦</div>
                <div class="feature-text">Material Request</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔧</div>
                <div class="feature-text">Field Request</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">💰</div>
                <div class="feature-text">Pengajuan Dana</div>
            </div>
        </div>

        <a href="frontend/pages/dashboard.html" class="entry-button">
            <span>Masuk ke Aplikasi</span>
            <span class="arrow-icon">→</span>
        </a>

        <div class="footer-note">
            © 2026 SAS OrderApps. Local Website Version.
        </div>
    </div>
</body>
</html>
