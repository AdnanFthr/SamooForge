<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAS OrderApps V3 - Local</title>
    <link rel="icon" type="image/x-icon" href="./frontend/assets/images/Logo3.png">
    <link rel="stylesheet" href="frontend/assets/css/global.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'CustomFont', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            min-height: 100dvh; /* Dynamic viewport height untuk mobile */
            background: linear-gradient(135deg, #0f5c93 0%, #1e3a5f 100%);
            color: white;
            overflow-x: hidden;
            overflow-y: auto; /* Enable scroll */
            -webkit-overflow-scrolling: touch; /* Smooth scroll di iOS */
        }

        .landing-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: fadeInUp 0.8s ease;
        }

        .logo-section {
            margin-bottom: 20px;
        }

        .logo-section img {
            width: 100px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .logo-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            line-height: 1;
        }

        .logo-section h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            line-height: 1.2;
        }

        .logo-section p {
            font-size: 1rem;
            opacity: 0.9;
            color: #c6a048;
        }

        .version-badge {
            display: inline-block;
            background: rgba(198, 160, 72, 0.2);
            border: 1px solid #c6a048;
            color: #c6a048;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
            text-align: center;
        }

        .feature-item {
            padding: 15px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            line-height: 1;
        }

        .feature-text {
            font-size: 0.8rem;
            opacity: 0.8;
            line-height: 1.3;
        }

        .entry-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #c6a048 0%, #b58d3a 100%);
            color: #1e3a5f;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(198, 160, 72, 0.3);
            margin-top: 20px;
            width: 100%;
            max-width: 280px;
        }

        .entry-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(198, 160, 72, 0.4);
        }

        .entry-button:active {
            transform: translateY(-1px);
        }

        .arrow-icon {
            transition: transform 0.3s ease;
            font-size: 1.2rem;
        }

        .entry-button:hover .arrow-icon {
            transform: translateX(5px);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
            padding-bottom: 20px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* CSS baru untuk center button */
        .button-wrapper {
            display: flex;
            justify-content: center;  /* Center horizontal */
            align-items: center;      /* Center vertical */
            width: 100%;
            margin-top: 20px;
        }
        
        /* Smartphone kecil (iPhone SE, dll) - < 375px */
        @media (max-width: 375px) {
            .landing-container {
                padding: 15px;
                justify-content: flex-start;
                padding-top: 30px;
            }

            .logo-icon {
                font-size: 3rem;
                margin-bottom: 10px;
            }

            .logo-section h1 {
                font-size: 1.6rem;
            }

            .logo-section p {
                font-size: 0.9rem;
            }

            .version-badge {
                padding: 5px 12px;
                font-size: 0.75rem;
                margin-bottom: 15px;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 8px;
                margin: 15px 0;
            }

            .feature-item {
                padding: 12px;
                display: flex;
                align-items: center;
                gap: 15px;
                text-align: left;
            }

            .feature-icon {
                font-size: 1.5rem;
                margin-bottom: 0;
            }

            .feature-text {
                font-size: 0.9rem;
            }

            .entry-button {
                padding: 14px 24px;
                font-size: 0.95rem;
                margin-top: 15px;
            }

            .footer-note {
                margin-top: 20px;
                font-size: 0.75rem;
            }
        }

        /* Smartphone sedang (iPhone 12/13/14, Samsung S20) - 376px - 428px */
        @media (min-width: 376px) and (max-width: 428px) {
            .landing-container {
                padding: 20px;
                justify-content: flex-start;
                padding-top: 40px;
            }

            .logo-icon {
                font-size: 3.2rem;
            }

            .logo-section h1 {
                font-size: 1.8rem;
            }

            .features {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .feature-item {
                padding: 15px 8px;
            }

            .feature-icon {
                font-size: 1.6rem;
            }

            .feature-text {
                font-size: 0.75rem;
            }

            .entry-button {
                padding: 16px 28px;
                font-size: 1rem;
            }
        }

        /* Smartphone besar (iPhone 14 Pro Max, Samsung Ultra) - 429px - 768px */
        @media (min-width: 429px) and (max-width: 768px) {
            .landing-container {
                padding: 30px;
                justify-content: center;
            }

            .features {
                gap: 15px;
            }

            .feature-item {
                padding: 20px 15px;
            }
        }

        /* Landscape mode untuk smartphone */
        @media (max-height: 500px) and (orientation: landscape) {
            .landing-container {
                justify-content: flex-start;
                padding-top: 20px;
                padding-bottom: 20px;
            }

            .logo-section {
                margin-bottom: 15px;
            }

            .logo-icon {
                font-size: 2.5rem;
                margin-bottom: 10px;
            }

            .logo-section h1 {
                font-size: 1.5rem;
            }

            .features {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin: 15px 0;
            }

            .feature-item {
                padding: 12px 8px;
            }

            .feature-icon {
                font-size: 1.4rem;
            }

            .feature-text {
                font-size: 0.75rem;
            }

            .entry-button {
                padding: 12px 24px;
                font-size: 0.9rem;
                margin-top: 15px;
            }

            .footer-note {
                margin-top: 15px;
                font-size: 0.75rem;
            }
        }

        /* Tablet */
        @media (min-width: 769px) and (max-width: 1024px) {
            .landing-container {
                max-width: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="logo-section">
            <div class="logo-icon">🏢</div>
            <h1>SAS OrderApps</h1>
            <p>Procurement Management System</p>
        </div>

        <div class="version-badge">V3 LOCAL EDITION</div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">📦</div>
                <div class="feature-text">Material Request</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔧</div>
                <div class="feature-text">Field Request</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">💰</div>
                <div class="feature-text">Pengajuan Dana</div>
            </div>
        </div>

        <div class="button-wrapper">
            <a href="frontend/pages/dashboard.html" class="entry-button">
                <span>Masuk ke Aplikasi</span>
                <span class="arrow-icon">→</span>
            </a>
        </div>

        <div class="footer-note">
            © 2026 SAS OrderApps. Local Website Version.
        </div>
    </div>
</body>
</html>
